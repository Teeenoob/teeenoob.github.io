<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cool Website Title</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph / Discord Embed -->
  <meta property="og:title" content="Cool Website Title">
  <meta property="og:description" content="This is a super cool website. Check it out!">
  <meta property="og:image" content="https://yourdomain.com/cool-image.png">
  <meta property="og:url" content="https://yourdomain.com">
  <meta property="og:type" content="website">

  <!-- Optional: Twitter Card for better embeds on other platforms -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Cool Website Title">
  <meta name="twitter:description" content="This is a super cool website. Check it out!">
  <meta name="twitter:image" content="https://yourdomain.com/cool-image.png">

  <style>
    body {
      background: linear-gradient(135deg, #4f8cff 0%, #8f6ed5 100%);
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      padding: 10vw 2vw;
      min-height: 100vh;
      margin: 0;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 0.4em;
      letter-spacing: 2px;
    }
    p {
      font-size: 1.5em;
      opacity: 0.85;
    }
    img {
      margin-top: 2em;
      border-radius: 1em;
      max-width: 100%;
      box-shadow: 0 4px 32px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <h1>Welcome to My Cool Site!</h1>
  <p>Share this link on Discord to see the magic! 😎</p>
  <img src="https://yourdomain.com/cool-image.png" alt="Cool site preview">
</body>
</html>
